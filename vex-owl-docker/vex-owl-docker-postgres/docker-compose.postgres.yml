# Docker Compose 配置文件 - PostgreSQL 数据库环境
# 用于 Vex Owl 项目的数据库服务部署
#
# 使用说明：
#   启动服务：docker-compose -f docker-compose.postgres.yml up -d
#   停止服务：docker-compose -f docker-compose.postgres.yml down
#   查看日志：docker-compose -f docker-compose.postgres.yml logs -f
#
# 数据库连接信息：
#   地址：localhost:5432
#   数据库：vex_owl
#   用户名：vex_user
#   密码：vex_password
version: '3.8'

services:
  # PostgreSQL 数据库服务
  postgres:
    image: postgres:15-alpine  # 使用 PostgreSQL 15 的 Alpine 轻量级镜像
    container_name: vex-postgres  # 容器名称
    environment:
      POSTGRES_DB: vex_owl  # 默认创建的数据库名称
      POSTGRES_USER: vex_user  # 数据库用户名
      POSTGRES_PASSWORD: vex_password  # 数据库密码
      TZ: Asia/Shanghai  # 设置时区为上海时间
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"  # 初始化参数，设置默认编码为 UTF-8
    ports:
      - "5432:5432"  # 映射端口，主机端口:容器端口
    volumes:
      - postgres_data:/var/lib/postgresql/data  # 持久化数据库数据文件
      - ./pg-hba.conf:/var/lib/postgresql/data/pg_hba.conf:ro  # 客户端认证配置
    deploy:
      resources:
        limits:
          cpus: '1.0'  # 限制 CPU 使用为 1 核
          memory: 512M  # 限制内存使用为 512MB
        reservations:
          cpus: '0.25'  # 预留 CPU 资源
          memory: 256M  # 预留内存资源
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vex_user -d vex_owl"]  # 健康检查命令
      interval: 10s  # 每10秒检查一次
      timeout: 5s  # 超时时间5秒
      retries: 5  # 重试次数
      start_period: 10s  # 启动宽限期10秒
    command: >  # PostgreSQL 配置参数优化
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

# 数据卷定义
volumes:
  postgres_data:  # PostgreSQL 数据持久化卷
