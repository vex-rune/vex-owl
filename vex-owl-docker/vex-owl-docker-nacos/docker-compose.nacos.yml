# docker-compose 配置版本，3.8是兼容性较好的稳定版本
version: '3.8'
services:
  # Nacos 服务配置
  nacos:
    # Nacos 镜像版本，v2.4.3是最新稳定版本，完美适配Spring Cloud 2023+
    image: nacos/nacos-server:v2.4.3
    # 容器名称，方便管理和识别
    container_name: vex-owl-nacos
    # 环境变量配置
    environment:
      # 运行模式：standalone=单机模式（开发环境使用），cluster=集群模式（生产环境使用）
      - MODE=standalone
      # 是否开启认证：true=开启登录认证，false=关闭认证（开发环境可设为false简化使用）
      - NACOS_AUTH_ENABLE=true
      # 认证身份识别key：服务间通信的身份标识，自定义即可，集群模式下所有节点需保持一致
      - NACOS_AUTH_IDENTITY_KEY=vex-owl
      # 认证身份识别value：对应上面key的验证值，自定义即可，建议设置复杂值
      - NACOS_AUTH_IDENTITY_VALUE=vex-owl@2026
      # JWT认证密钥：用于生成登录token，必须至少32位字符，生产环境请务必修改为自定义密钥
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      # JVM堆内存初始值：本地开发环境建议设为512m以上，运行更流畅，生产环境建议设为1G以上
      - JVM_XMS=512m
      # JVM堆内存最大值：本地开发环境建议设为512m以上，避免OOM，生产环境建议设为1G以上
      - JVM_XMX=512m
      # JVM新生代内存大小：建议设置为堆内存的1/2，提升GC效率
      - JVM_XMN=256m
    # 数据卷挂载：将容器内数据映射到C盘固定目录，容器删除/项目移动都不会丢失数据
    # 端口映射：宿主机端口:容器内端口
    ports:
      # 8848：Nacos HTTP服务端口，控制台访问和HTTP API调用使用
      - "8848:8848"
      # 9848：Nacos gRPC服务端口，Nacos2.x新增，用于服务注册发现和配置推送的长连接
      - "9848:9848"
    # 重启策略：always=Docker启动时自动启动，容器异常退出时自动重启
    restart: always
    # 加入自定义网络，实现容器间通信
    networks:
      - vex-owl-network
# 自定义Docker网络，所有项目服务都加入此网络，实现容器间通过服务名互相访问
networks:
  vex-owl-network:
    # 网络驱动：bridge=桥接模式，最常用的容器网络模式
    driver: bridge
