# ================================================
# Vex-Owl 统一 Docker Compose 配置文件
# ================================================
# 说明：
#   - 整合 Nacos 配置中心和 PostgreSQL 数据库服务
#   - 支持单一命令部署：docker-compose up -d
#   - 兼容标准管理命令：start、stop、restart、logs、down
#   - 内置启动后自检功能
#   - 所有数据卷统一挂载到 ./data
# ================================================
version: '3.8'

services:
  # ================================================
  # Nacos 配置中心服务
  # ================================================
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: vex-owl-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=vex-owl
      - NACOS_AUTH_IDENTITY_VALUE=vex-owl@2026
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - JVM_XMS=768m
      - JVM_XMX=768m
      - JVM_XMN=384m
    volumes:
      - ./data/nacos/data:/home/nacos/data
      - ./data/nacos/logs:/home/nacos/logs
    networks:
      - vex-owl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M

  # ================================================
  # Redis 缓存服务
  # ================================================
  redis:
    image: redis:7.2.4
    container_name: vex-owl-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      TZ: Asia/Shanghai
      REDIS_PASSWORD: VexOwl2026@Redis
    volumes:
      - ./data/redis/data:/data
    networks:
      - vex-owl-network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ================================================
  # PostgreSQL 数据库服务
  # ================================================
  postgres:
    image: postgres:15-alpine
    container_name: vex-owl-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vex_owl
      POSTGRES_USER: vex_user
      POSTGRES_PASSWORD: vex_password
      TZ: Asia/Shanghai
      POSTGRES_INITDB_ARGS: --encoding=UTF-8
    volumes:
      - ./data/postgres/data:/var/lib/postgresql/data
    networks:
      - vex-owl-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vex_user -d vex_owl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

  # ================================================
  # 环境自检服务
  # ================================================
  health-check:
    image: docker.io/library/docker:latest
    container_name: vex-owl-health-check
    restart: "no"
    depends_on:
      nacos:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - vex-owl-network
    command: >
      /bin/sh -c "
        echo '==============================================';
        echo '     Vex-Owl 环境自检';
        echo '==============================================';
        echo '';
        echo '等待服务启动...';
        sleep 10;
        echo '';
        echo '检查 Nacos 服务...';
        curl -sf http://nacos:8848/nacos/v1/console/health/readiness && echo ' ✓ Nacos 健康检查通过' || echo ' ✗ Nacos 健康检查失败';
        echo '';
        echo '检查 PostgreSQL 服务...';
        PGPASSWORD=vex_password psql -h postgres -U vex_user -d vex_owl -c 'SELECT 1;' > /dev/null 2>&1 && echo ' ✓ PostgreSQL 健康检查通过' || echo ' ✗ PostgreSQL 健康检查失败';
        echo '';
        echo '检查 Redis 服务...';
        redis-cli -h redis ping > /dev/null 2>&1 && echo ' ✓ Redis 健康检查通过' || echo ' ✗ Redis 健康检查失败';
        echo '';
        echo '==============================================';
        echo '自检完成！';
        echo '==============================================';
        echo '';
        echo '服务访问地址：';
        echo '  Nacos 控制台: http://localhost:8848/nacos';
        echo '  PostgreSQL: localhost:5432';
        echo '  Redis: localhost:6379';
        echo '';
        echo '数据存储路径：';
        echo '  ./data/nacos/data';
        echo '  ./data/nacos/logs';
        echo '  ./data/postgres/data';
        echo '  ./data/redis/data';
        echo '';
        exit 0;
      "
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# ================================================
# 网络配置
# ================================================
networks:
  vex-owl-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.28.0.0/16