# ================================================
# Vex-Owl Nacos 配置中心
# ================================================
# 启动命令: docker-compose -f nacos.yml up -d
# 停止命令: docker-compose -f nacos.yml down
# 访问地址: http://localhost:8848/nacos
# 默认账号: nacos / nacos
# ================================================
version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v3.0.3
    container_name: vex-owl-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"   # Nacos 控制台
      - "9848:9848"   # gRPC 通信端口 1
      - "9849:9849"   # gRPC 通信端口 2
    environment:
      # 运行模式：standalone 单机模式
      MODE: standalone

      # 认证配置
      NACOS_AUTH_ENABLE: true
      NACOS_AUTH_IDENTITY_KEY: vex-owl
      NACOS_AUTH_IDENTITY_VALUE: vex-owl@2026
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789

      # JVM 内存配置
      JVM_XMS: 768m   # 初始堆大小
      JVM_XMX: 768m   # 最大堆大小
      JVM_XMN: 384m   # 年轻代大小

    volumes:
      - ./data/nacos/data:/home/nacos/data
      - ./data/nacos/logs:/home/nacos/logs

    networks:
      - vex-owl-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  vex-owl-network:
    driver: bridge