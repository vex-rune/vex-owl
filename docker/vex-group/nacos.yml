# ================================================
# Vex-Owl Nacos 配置中心
# ================================================
# 启动命令: docker-compose -f nacos.yml up -d
# 停止命令: docker-compose -f nacos.yml down
# 端口: 8848
# ================================================
version: '3.8'

services:
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: vex-owl-nacos
    restart: unless-stopped
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=true
      - NACOS_AUTH_IDENTITY_KEY=vex-owl
      - NACOS_AUTH_IDENTITY_VALUE=vex-owl@2026
      - NACOS_AUTH_TOKEN=SecretKey012345678901234567890123456789012345678901234567890123456789
      - JVM_XMS=768m
      - JVM_XMX=768m
      - JVM_XMN=384m
    volumes:
      - ./data/nacos/data:/home/nacos/data
      - ./data/nacos/logs:/home/nacos/logs
    networks:
      - vex-owl-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/v1/console/health/readiness"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 512M

networks:
  vex-owl-network:
    driver: bridge