# ================================================
# VEX-OWL 网关服务 - 本地开发环境配置
# ================================================

# ------------------------------
# 日志配置 - 本地开发使用DEBUG级别
# ------------------------------
logging:
  level:
    root: DEBUG  # 根日志级别
    com.vex.owl.gateway.filter: DEBUG  # 过滤器详细日志
    org.springframework.cloud.gateway: DEBUG  # Gateway调试日志
    org.springframework.web: DEBUG  # Web层日志
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"  # 彩色控制台输出
  file:
    enabled: false  # 本地开发不写文件日志

# ------------------------------
# 开发辅助配置
# ------------------------------
spring:
  devtools:
    restart:
      enabled: true  # 开启热重载
      additional-paths: src/main/java  # 监控的额外路径
    livereload:
      enabled: true  # 开启LiveReload
  
  # Gateway HTTP客户端配置 - 开发环境更宽松
  cloud:
    gateway:
      httpclient:
        wiretap: true  # 开启请求日志，方便调试
        connect-timeout: 30000  # 连接超时30秒
        response-timeout: 60s  # 响应超时60秒

# ------------------------------
# 监控配置 - 开发环境暴露所有端点
# ------------------------------
management:
  endpoints:
    web:
      exposure:
        include: '*'  # 暴露所有监控端点
  endpoint:
    health:
      show-details: always  # 健康检查显示详细信息
    env:
      show-values: ALWAYS  # 显示环境变量值
    configprops:
      show-values: ALWAYS  # 显示配置属性值
  health:
    discovery:
      enabled: true
  tracing:
    enabled: true  # 开启链路追踪
  metrics:
    tags:
      application: ${spring.application.name}  # 指标统一添加服务名标签
    distribution:
      percentiles-histogram:
        http.server.requests: true  # 开启请求耗时直方图统计
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99  # 统计P50/P90/P95/P99分位耗时
