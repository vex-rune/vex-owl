# ================================================
# VEX-OWL AI 服务 - Bootstrap 配置文件
# ================================================
vex:
  ai:
    chat:
      model: qwen-plus
      temperature: 0.7
      max-tokens: 4096

server:
  port: 9205

spring:
  application:
    name: vex-owl-ai-server
  profiles:
    active: dev
  config:
    import: optional:nacos
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
        shared-configs:
          - data-id: common-config.yml
            group: COMMON_GROUP
            refresh: true
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        group: vex-group
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:VexOwl2026@Redis}
      database: ${REDIS_DATABASE:0}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1
  datasource:
    url: jdbc:postgresql://localhost:5432/vex_owl
    username: vex_user
    password: vex_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}
      base-url: https://dashscope.aliyuncs.com/api/v1
    embedding:
      options:
        model: text-embedding-v3

logging:
  level:
    root: INFO
    com.vex.owl.ai: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %5p %-40.40logger{39} : %m%n"
  file:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

spring.cloud.config.bootstrap: true