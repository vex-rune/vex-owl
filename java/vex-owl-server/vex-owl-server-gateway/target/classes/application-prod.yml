

# ------------------------------
# 性能优化配置
# ------------------------------
spring:
  # 关闭开发工具
  devtools:
    restart:
      enabled: false  # 关闭热重载
    livereload:
      enabled: false  # 关闭LiveReload
  
  # Gateway HTTP客户端配置 - 生产环境优化
  cloud:
    gateway:
      httpclient:
        wiretap: false  # 关闭请求日志，提升性能
        connect-timeout: 10000  # 连接超时10秒
        response-timeout: 30s  # 响应超时30秒
        pool:
          type: ELASTIC
          max-connections: 1000  # 最大连接数1000
          acquire-timeout: 45000  # 连接获取超时45秒

# ------------------------------
# Redis 配置 - 生产环境
# ------------------------------
spring:
  data:
    redis:
      host: ${REDIS_HOST:localhost}     # Redis主机地址，可通过环境变量覆盖
      port: ${REDIS_PORT:6379}          # Redis端口，可通过环境变量覆盖
      password: ${REDIS_PASSWORD:}      # Redis密码，建议通过环境变量设置
      database: ${REDIS_DATABASE:0}     # Redis数据库索引
      timeout: 3000                     # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: 20                # 连接池最大连接数
          max-idle: 10                  # 连接池最大空闲连接数
          min-idle: 5                   # 连接池最小空闲连接数
          max-wait: 3000                # 连接池最大阻塞等待时间（毫秒）

# ------------------------------
# 监控配置 - 生产环境精简端点
# ------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics  # 只暴露必要的监控端点
  endpoint:
    health:
      show-details: when-authorized  # 只有授权用户才能看到详细信息
      roles: ADMIN  # 需要ADMIN角色
    env:
      show-values: NEVER  # 不显示环境变量值
    configprops:
      show-values: NEVER  # 不显示配置属性值
  health:
    discovery:
      enabled: true
  tracing:
    enabled: true  # 开启链路追踪
  metrics:
    tags:
      application: ${spring.application.name}  # 指标统一添加服务名标签
    distribution:
      percentiles-histogram:
        http.server.requests: true  # 开启请求耗时直方图统计
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99  # 统计P50/P90/P95/P99分位耗时
  
  # 安全配置
  security:
    enabled: true  # 开启监控端点安全认证
    roles: ADMIN  # 需要ADMIN角色访问
