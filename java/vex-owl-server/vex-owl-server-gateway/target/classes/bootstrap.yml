# ================================================
# VEX-OWL 网关服务 - Bootstrap 配置
# 说明：此文件包含所有环境共用的基础配置
# 端口：9201
# 监控地址：http://localhost:9201/actuator/prometheus
# ================================================

# ------------------------------
# 服务器基础配置
# ------------------------------
server:
  port: 9201  # 网关服务监听端口

# ------------------------------
# Spring 基础配置
# ------------------------------
spring:
  application:
    name: vex-owl-gateway-server  # 服务名，用于Nacos注册
  
  # 默认激活本地开发环境
  profiles:
    active: dev  # 可通过环境变量 SPRING_PROFILES_ACTIVE 覆盖
  
  config:
    import: optional:nacos  # 启用Nacos配置中心（可选）

  # ------------------------------
  # Nacos 配置中心
  # ------------------------------
  cloud:
    nacos:
      config:
        import-check:
          enabled: false  # 关闭Nacos配置缺失检查（本地开发时Nacos可能未启动）
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}  # Nacos服务地址，可通过环境变量覆盖
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        file-extension: yml
        shared-configs:
          - data-id: common-config.yml  # 公共配置
            group: COMMON_GROUP
            refresh: true  # 配置自动刷新
      
      # ------------------------------
      # Nacos 服务发现
      # ------------------------------
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:nacos}
        namespace: ${NACOS_NAMESPACE:public}
        group: vex-group
        weight: 100  # 负载均衡权重
        heartbeat-interval-ms: 5000  # 心跳间隔5秒
        heartbeat-timeout-ms: 15000  # 心跳超时15秒
        ip-delete-timeout-ms: 30000  # 服务下线超时30秒
        metadata:
          management.context-path: /actuator  # 监控端点路径
          version: 1.0.0  # 服务版本

    # ------------------------------
    # Spring Cloud Gateway 基础配置
    # ------------------------------
    gateway:
      discovery:
        locator:
          enabled: true  # 开启自动路由：Nacos上的服务会自动生成 /服务名/** 路由
          lower-case-service-id: true  # 自动将服务名转小写

      # 全局过滤器（对所有路由生效）
      default-filters:
        - name: RequestSize
          args:
            maxSize: 100MB  # 限制上传文件最大100MB
        - StripPrefix=1  # 去掉第一个路径前缀

      # HTTP客户端基础配置（具体超时时间在profile中配置）
      httpclient:
        pool:
          type: ELASTIC
          max-connections: 500  # 最大连接数
          acquire-timeout: 30000  # 连接获取超时

# ------------------------------
# 全局系统配置
# ------------------------------
spring.cloud.config.enabled: true
spring.webflux.static-path-pattern: /static/**  # 静态资源路径
spring.cloud.compatibility-verifier.enabled: false  # 关闭版本兼容性检查

# ------------------------------
# JWT 认证配置（所有环境共用）
# ------------------------------
jwt:
  secret: ${JWT_SECRET:dmV4LW93bC1qd3Qtc2VjcmV0LWtleS0yMDI2LTA1LTE4}  # JWT签名密钥，可通过环境变量覆盖
  expiration: 86400000  # 令牌有效期24小时（单位：毫秒）
  header: Authorization  # 令牌存放的请求头名称
  prefix: Bearer   # 令牌前缀


