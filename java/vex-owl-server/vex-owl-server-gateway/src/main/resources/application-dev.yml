# ================================================
# VEX-OWL 网关服务 - 本地开发环境配置
# ================================================

# ------------------------------
# Spring 配置
# ------------------------------
spring:
  devtools:
    restart:
      enabled: true  # 开启热重载
      additional-paths: src/main/java  # 监控的额外路径
    livereload:
      enabled: true  # 开启LiveReload

  # Gateway HTTP客户端配置 - 开发环境更宽松
  cloud:
    gateway:
      httpclient:
        wiretap: true  # 开启请求日志，方便调试
        connect-timeout: 30000  # 连接超时30秒
        response-timeout: 60s  # 响应超时60秒

  # Redis 配置 - 开发环境
  data:
    redis:
      host: localhost  # Redis主机地址，可通过环境变量覆盖
      port: 6379      # Redis端口，可通过环境变量覆盖
      password: VexOwl2026@Redis  # Redis密码
      database: 0  # Redis数据库索引
      timeout: 5000                  # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: 8              # 连接池最大连接数
          max-idle: 8                # 连接池最大空闲连接数
          min-idle: 0                # 连接池最小空闲连接数
          max-wait: -1               # 连接池最大阻塞等待时间（负值表示没有限制）

# ------------------------------
# 监控配置 - 开发环境暴露所有端点
# ------------------------------
management:
  endpoints:
    web:
      exposure:
        include: '*'  # 暴露所有监控端点
  endpoint:
    health:
      show-details: always  # 健康检查显示详细信息
    env:
      show-values: ALWAYS  # 显示环境变量值
    configprops:
      show-values: ALWAYS  # 显示配置属性值
  health:
    discovery:
      enabled: true
  tracing:
    enabled: true  # 开启链路追踪
  metrics:
    tags:
      application: ${spring.application.name}  # 指标统一添加服务名标签
    distribution:
      percentiles-histogram:
        http.server.requests: true  # 开启请求耗时直方图统计
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99  # 统计P50/P90/P95/P99分位耗时