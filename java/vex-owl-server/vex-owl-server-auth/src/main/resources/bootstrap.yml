# ================================================
# VEX-OWL 认证服务 - Bootstrap 配置文件
# ================================================
# 说明：
#   - 本文件为认证服务唯一配置文件，整合了所有环境配置
#   - 配置项按优先级和功能分组，vex 项目专用配置置于最前
#   - 通过 ${VAR:default} 语法支持环境变量覆盖
#   - 服务端口：9202
# ================================================

# ================================================
# 第一部分：Vex 项目配置
# ================================================
# 项目自定义配置，用于业务功能参数
vex:
  # ----------------------------------------
  # JWT 认证配置
  # ----------------------------------------
  jwt:
    # JWT 签名密钥（生产环境必须更换为复杂密钥，建议使用 256 位随机字符串）
    secret: vex-owl-jwt-secret-key-dev-only-not-for-production-2024

    # Token 有效期（毫秒），默认 24 小时 = 86400000ms
    expiration: 86400000

    # HTTP Header 名称，用于传递 Token
    header: Authorization

    # Token 前缀，Bearer Token 格式
    prefix: "Bearer "

# ================================================
# 第二部分：服务器基础配置
# ================================================
server:
  # 服务监听端口
  port: 9202

# ================================================
# 第三部分：Spring Boot 核心配置
# ================================================
spring:
  # 应用名称（用于 Nacos 注册和服务发现）
  application:
    name: vex-owl-auth-server

  # 激活的配置文件（dev/test/prod）
  profiles:
    active: dev

  # 配置导入：启用 Nacos 配置中心（optional 表示配置中心不可用时不影响启动）
  config:
    import: optional:nacos

  # ----------------------------------------
  # Cloud 配置（微服务框架）
  # ----------------------------------------
  cloud:
    # Nacos 配置中心
    nacos:
      config:
        # 关闭配置缺失检查（本地开发时 Nacos 可能未启动）
        import-check:
          enabled: false

        # Nacos 服务器地址，支持环境变量覆盖
        # 开发环境默认 localhost:8848
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

        # Nacos 认证用户名
        username: ${NACOS_USERNAME:nacos}

        # Nacos 认证密码
        password: ${NACOS_PASSWORD:nacos}

        # 配置文件格式
        file-extension: yml

        # 共享配置列表（所有服务共用的配置）
        shared-configs:
          - data-id: common-config.yml
            group: COMMON_GROUP
            # 启用配置热刷新，无需重启服务
            refresh: true

      # Nacos 服务发现
      discovery:
        # Nacos 服务器地址
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}

        # 服务注册认证用户名
        username: ${NACOS_USERNAME:nacos}

        # 服务注册认证密码
        password: ${NACOS_PASSWORD:nacos}

        # Nacos 命名空间（用于环境隔离，如 dev/test/prod）
        namespace: ${NACOS_NAMESPACE:public}

        # 服务所属分组（用于服务分组管理）
        group: vex-group

  # ----------------------------------------
  # Redis 配置（缓存和分布式锁）
  # ----------------------------------------
  data:
    redis:
      # Redis 服务器地址
      host: ${REDIS_HOST:localhost}

      # Redis 端口
      port: ${REDIS_PORT:6379}

      # Redis 认证密码（生产环境必须设置）
      password: ${REDIS_PASSWORD:VexOwl2026@Redis}

      # Redis 数据库索引（0-15）
      database: ${REDIS_DATABASE:0}

      # 连接超时时间（毫秒）
      timeout: 5000

      # 连接池配置
      lettuce:
        pool:
          # 最大连接数
          max-active: 8

          # 最大空闲连接数
          max-idle: 8

          # 最小空闲连接数
          min-idle: 0

          # 连接最大等待时间（毫秒，-1 表示无限制）
          max-wait: -1

  # ----------------------------------------
  # 数据源配置（PostgreSQL 数据库）
  # ----------------------------------------
  datasource:
    # JDBC 连接 URL
    url: jdbc:postgresql://localhost:5432/vex_owl

    # 数据库用户名
    username: vex_user

    # 数据库密码
    password: vex_password

    # 数据库驱动类
    driver-class-name: org.postgresql.Driver

    # Hikari 连接池配置
    hikari:
      # 最大连接数
      maximum-pool-size: 10

      # 最小空闲连接数
      minimum-idle: 5

      # 连接超时时间（毫秒）
      connection-timeout: 30000

      # 空闲连接超时时间（毫秒）
      idle-timeout: 600000

      # 连接最大生命周期（毫秒）
      max-lifetime: 1800000

  # ----------------------------------------
  # JPA 配置（Java 持久化 API）
  # ----------------------------------------
  jpa:
    # Hibernate DDL 策略：update（自动更新表结构，生产环境建议用 validate）
    hibernate:
      ddl-auto: update

    # 显示 SQL 语句（开发环境开启，便于调试）
    show-sql: true

    # Hibernate 专属配置
    properties:
      hibernate:
        # PostgreSQL 数据库方言
        dialect: org.hibernate.dialect.PostgreSQLDialect

        # 格式化 SQL 语句输出
        format_sql: true

# ================================================
# 第四部分：日志配置
# ================================================
logging:
  # 日志级别配置
  level:
    # 根日志级别
    root: DEBUG

    # 认证服务详细日志
    com.vex.owl.auth: DEBUG

    # Spring Security 框架日志
    org.springframework.security: DEBUG

    # Web 层日志
    org.springframework.web: DEBUG

  # 控制台日志格式（彩色输出）
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"

  # 禁用文件日志（开发环境仅输出到控制台）
  file:
    enabled: false

# ================================================
# 第五部分：监控配置（Actuator）
# ================================================
management:
  # 暴露的监控端点（* 表示全部）
  endpoints:
    web:
      exposure:
        include: '*'

  # 端点详细配置
  endpoint:
    # 健康检查端点配置
    health:
      # 显示详细信息（包含各组件状态）
      show-details: always

    # 环境变量端点
    env:
      show-values: ALWAYS

    # 配置属性端点
    configprops:
      show-values: ALWAYS

  # 健康检查配置
  health:
    # 启用服务发现（显示注册的服务信息）
    discovery:
      enabled: true

  # 链路追踪配置
  tracing:
    enabled: true

  # 指标配置
  metrics:
    # 指标添加服务名标签
    tags:
      application: ${spring.application.name}

    # 响应时间分位数统计
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99

# ================================================
# 第六部分：Bootstrap 上下文配置
# ================================================
# 启用 Spring Cloud Bootstrap 上下文
# 确保配置属性在应用启动早期加载
spring.cloud.config:
  bootstrap: true