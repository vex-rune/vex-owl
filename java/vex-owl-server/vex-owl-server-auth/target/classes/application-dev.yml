# ================================================
# VEX-OWL 认证服务 - 本地开发环境配置
# ================================================

# ------------------------------
# 日志配置 - 本地开发使用DEBUG级别
# ------------------------------
logging:
  level:
    root: DEBUG  # 根日志级别
    com.vex.owl.auth: DEBUG  # 认证服务详细日志
    org.springframework.security: DEBUG  # 安全框架调试日志
    org.springframework.web: DEBUG  # Web层日志
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"  # 彩色控制台输出
  file:
    enabled: false  # 本地开发不写文件日志

# ------------------------------
# 开发辅助配置
# ------------------------------
spring:
  
  # 数据源配置 - 开发环境使用本地PostgreSQL
  #       POSTGRES_DB: vex_owl
  #      POSTGRES_USER: vex_user
  #      POSTGRES_PASSWORD: vex_password
  datasource:
    url: jdbc:postgresql://localhost:5432/vex_owl
    username: vex_user
    password: vex_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # JPA 配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# ------------------------------
# Redis 配置 - 开发环境
# ------------------------------
  data:
    redis:
      host: ${REDIS_HOST:localhost}  # Redis主机地址，可通过环境变量覆盖
      port: ${REDIS_PORT:6379}       # Redis端口，可通过环境变量覆盖
      password: ${REDIS_PASSWORD:}   # Redis密码，默认为空
      database: ${REDIS_DATABASE:0}  # Redis数据库索引
      timeout: 5000                  # 连接超时时间（毫秒）
      lettuce:
        pool:
          max-active: 8              # 连接池最大连接数
          max-idle: 8                # 连接池最大空闲连接数
          min-idle: 0                # 连接池最小空闲连接数
          max-wait: -1               # 连接池最大阻塞等待时间（负值表示没有限制）


owl:
# ------------------------------
# JWT 配置 - 开发环境使用默认密钥
# ------------------------------
  jwt:
    secret: vex-owl-jwt-secret-key-dev-only-not-for-production-2024
    expiration: 86400000  # 24小时（毫秒）
    header: Authorization
    prefix: "Bearer "

# ------------------------------
# 监控配置 - 开发环境暴露所有端点
# ------------------------------
management:
  endpoints:
    web:
      exposure:
        include: '*'  # 暴露所有监控端点
  endpoint:
    health:
      show-details: always  # 健康检查显示详细信息
    env:
      show-values: ALWAYS  # 显示环境变量值
    configprops:
      show-values: ALWAYS  # 显示配置属性值
  health:
    discovery:
      enabled: true
  tracing:
    enabled: true  # 开启链路追踪
  metrics:
    tags:
      application: ${spring.application.name}  # 指标统一添加服务名标签
    distribution:
      percentiles-histogram:
        http.server.requests: true  # 开启请求耗时直方图统计
      percentiles:
        http.server.requests: 0.5, 0.9, 0.95, 0.99  # 统计P50/P90/P95/P99分位耗时