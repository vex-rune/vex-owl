# ================================================
# VEX-OWL 通知服务 - Bootstrap 配置文件
# ================================================
vex:
  mail:
    from: ${MAIL_FROM:noreply@example.com}

server:
  port: 9206

spring:
  application:
    name: notification-server
  profiles:
    active: dev
  config:
    import: optional:nacos
  cloud:
    nacos:
      config:
        enabled: true
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:public}
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:17696}
        username: ''
        password: ''
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: common-config.yml
            group: COMMON_GROUP
            refresh: true
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:17696}
        username: ''
        password: ''
        namespace: ${NACOS_NAMESPACE:public}
        group: vex-group
  datasource:
    url: jdbc:postgresql://localhost:10864/vex_owl
    username: vex_user
    password: vex_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        validator:
          apply_to_ddl: false
  mail:
    host: ${MAIL_HOST:smtpdm.aliyun.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:noreply@example.com}
    password: ${MAIL_PASSWORD:SALaisIJFkl34dj}
    properties:
      mail:
        smtp:
          auth: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

logging:
  level:
    root: INFO
    com.vex.owl.notification: DEBUG
  pattern:
    console: "%d{HH:mm:ss.SSS} %5p %-40.40logger{39} : %m%n"
  file:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}