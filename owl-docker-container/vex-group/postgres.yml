# ================================================
# Vex-Owl PostgreSQL 数据库
# ================================================
# 启动命令: docker-compose -f postgres.yml up -d
# 停止命令: docker-compose -f postgres.yml down
# 访问地址: localhost:10864
# 数据库: vex_owl
# 用户名: vex_user
# 密码: vex_password
# ================================================
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: vex-owl-postgres
    restart: unless-stopped
    ports:
      - "10864:5432"
    environment:
      # 数据库名称
      POSTGRES_DB: vex_owl

      # 数据库用户名
      POSTGRES_USER: vex_user

      # 数据库密码
      POSTGRES_PASSWORD: vex_password

      # 时区配置
      TZ: Asia/Shanghai

      # 初始化参数：设置编码为 UTF-8
      POSTGRES_INITDB_ARGS: --encoding=UTF-8

    volumes:
      - ../../data/postgres/data:/var/lib/postgresql/data

    networks:
      - vex-owl-network

    # PostgreSQL 服务器启动命令及参数
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vex_user -d vex_owl"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '1.0'
          memory: 512M

networks:
  vex-owl-network:
    driver: bridge